name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier
        run: npm run code-style
        continue-on-error: true

      - name: Build Stencil components
        run: npm run stencil:build
        continue-on-error: true

      - name: Build Storybook project
        run: npm run storybook:build
        continue-on-error: true

      - name: Check for step failures
        run: |
          if [ ${{ job.status }} == 'failure' ]; then
            echo "One or more steps have failed. Please review the logs and fix the issues before merging."
            exit 1
          fi
