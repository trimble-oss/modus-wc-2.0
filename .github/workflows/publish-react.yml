# This publishes various packages in this repository.
# It will update the package.json version, build the react package, publish it to the Artifactory NPM registry, as well as create a GitHub release.
# This is triggered by running the main 'Publish & Release' workflow.

name: Publish & Release - React

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  build-and-publish-react:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: integrations/react/v18

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Install Web Component dependencies
        run: npm ci
        working-directory: .

      - name: Build Web Components
        run: npm run build:ci
        working-directory: .

      - name: Update to use new WebComponent version
        run: |
          jq --arg version "${{ github.event.inputs.version }}" \
          '.dependencies["@trimble-cms/modus-wc"] = $version' package.json > package.json.tmp && \
          mv package.json.tmp package.json && npm i

      - name: Update package.json version
        run: |
          jq --arg version "${{ github.event.inputs.version }}-react18" \
          '.version = $version' package.json > package.json.tmp && \
          mv package.json.tmp package.json

      - name: Build React integration
        run: npm run build

      - name: Pack the package
        run: npm pack

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: '**/*.tgz'

      - name: Publish
        run: npm publish

  release-react:
    needs: build-and-publish-react
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: integrations/react

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-tarball
          path: .

      - name: Find the asset
        id: find-asset
        run: |
          asset_path=$(find . -name 'trimble-cms-modus-wc-react*.tgz')
          full_asset_path="${{ github.workspace }}/integrations/react/${asset_path}"
          echo "asset_path=$full_asset_path" >> $GITHUB_OUTPUT

      - name: Rename the asset to package-react.tgz
        run: mv ${{ steps.find-asset.outputs.asset_path }} package-react.tgz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: modus-wc-react-${{ github.event.inputs.version }}
          name: Modus Web Components React ${{ github.event.inputs.version }}
          files: |
            package-react.tgz
