name: Cleanup Storybook PR Preview
on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          ref: gh-pages # Checkout the gh-pages branch
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Remove PR Preview
        run: |
          # Check if PR preview directory exists
          if [ -d "pr-preview/pr-${{ github.event.pull_request.number }}" ]; then
            # Remove the PR preview directory
            git rm -rf pr-preview/pr-${{ github.event.pull_request.number }}

            # Commit and push the change
            git commit -m "Remove Storybook preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          else
            echo "No preview directory found for PR #${{ github.event.pull_request.number }}"
          fi
