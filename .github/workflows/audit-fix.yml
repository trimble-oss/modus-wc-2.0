name: npm audit fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

concurrency:
  group: npm-audit-fix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - '.'
          - 'integrations/angular/ng17'
          - 'integrations/angular/ng18'
          - 'integrations/angular/ng19'
          - 'integrations/react/v17'
          - 'integrations/react/v18'
          - 'integrations/react/v19'
          - 'integrations/react/test-react-v17'
          - 'integrations/react/test-react-v18'
          - 'integrations/react/test-react-v19'
          - 'integrations/vue/v-latest'
          - 'integrations/vue/test-app'

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.directory }}
        run: npm ci

      - name: Run npm audit and save output
        working-directory: ${{ matrix.directory }}
        run: npm audit --json > audit-output.json || true

      - name: Upload audit output as artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: audit-output-${{ matrix.directory == '.' && 'root' || matrix.directory }}
          path: ${{ matrix.directory }}/audit-output.json

      - name: Apply npm audit fix
        working-directory: ${{ matrix.directory }}
        run: npm audit fix || true

      - name: Push fix branch and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DIR="${{ matrix.directory }}"
          LABEL=$(echo "$DIR" | sed 's|/|-|g')
          BRANCH="fix/npm-audit-fix-${LABEL}-$(date +%Y-%m-%d)-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add "${{ matrix.directory }}/package-lock.json" "${{ matrix.directory }}/package.json"
          git diff --cached --quiet && echo "Nothing to commit, working tree clean" && exit 0
          git commit -m "fix: npm audit fix ${DIR} $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "fix: npm audit fix ${DIR} $(date +%Y-%m-%d)" --body "Automated PR from \`npm audit fix\` for \`${DIR}\` run on $(date +%Y-%m-%d)." --base main --head "$BRANCH"
