# This publishes various packages in this repository.
# It will update the package.json version, build the packages, publish them to the Artifactory NPM registry, as well as create a GitHub release.
# The packages consist of:
# - The Web Components package
# - The React package
# - The Angular package
# This is triggered by a manual run with a specified version number.

name: Publish & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  build-and-publish-wc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Install dependencies
        run: npm ci

      - name: Update package.json version
        run: |
          jq --arg version "${{ github.event.inputs.version }}" \
          '.version = $version' package.json > package.json.tmp && \
          mv package.json.tmp package.json

      - name: Build web components
        run: npm run build:ci

      - name: Set npm Registry Auth Token
        run: npm set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Pack the package
        working-directory: dist
        run: npm pack
        id: npm_pack

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: 'dist/*.tgz'

      - run: rm dist/*.tgz

      - name: Publish npm Package Publicly
        working-directory: dist
        run: npm publish

      - name: Set GitHub Registry Auth Token
        working-directory: dist
        run: npm set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm Package to GitHub Registry
        working-directory: dist
        run: npm publish --access public --ignore-scripts --@trimble-oss:registry='https://npm.pkg.github.com'
        # TODO: remove once we configure this repo's permissions
        continue-on-error: true

  trigger-angular-publish:
    needs: build-and-publish-wc
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Angular Publish Workflow
        uses: benc-uk/workflow-dispatch@v1.2
        with:
          workflow: publish-angular.yml
          inputs: '{"version": "${{ github.event.inputs.version }}"}'

  trigger-react-publish:
    needs: build-and-publish-wc
    runs-on: ubuntu-latest
    steps:
      - name: Trigger React Publish Workflow
        uses: benc-uk/workflow-dispatch@v1.2
        with:
          workflow: publish-react.yml
          inputs: '{"version": "${{ github.event.inputs.version }}"}'

  release-wc:
    needs: build-and-publish-wc
    runs-on: ubuntu-latest
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-tarball
          path: .

      - name: Find the asset
        id: find-asset
        run: echo "asset_path=$(find . -name 'trimble-oss-moduswebcomponents-*.tgz')" >> $GITHUB_OUTPUT

      - name: Rename the asset to package.tgz
        run: mv ${{ steps.find-asset.outputs.asset_path }} package.tgz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: moduswebcomponents-${{ github.event.inputs.version }}
          name: Modus Web Components ${{ github.event.inputs.version }}
          files: |
            package.tgz
