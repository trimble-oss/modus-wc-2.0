# This publishes various packages in this repository.
# It will update the package.json version, build the packages, publish them to the Artifactory NPM registry, as well as create a GitHub release.
# The packages consist of:
# - The Web Components package
# - The React package
# - The Angular package
# - The Vue package
# This is triggered by a manual run with a specified version number.

name: Publish & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  build-and-publish-wc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Install dependencies
        run: npm ci
        env:
          TRIMBLE_AGENTIC_NPM_TOKEN: ${{ secrets.TRIMBLE_AGENTIC_NPM_TOKEN }}

      - name: Validate version bump follows SemVer
        run: |
          set -euo pipefail

          current="$(node -p "require('./package.json').version")"

          # Capture the raw input version and ensure it does not start with 'v'
          input='${{ github.event.inputs.version }}'
          if [ "${input#v}" != "$input" ]; then
            echo "❌ Version '$input' must not start with 'v'. Please provide a bare SemVer like '1.2.3'." >&2
            exit 1
          fi

          # Validate that the input is a valid SemVer version using the semver CLI
          valid="$(npx --yes semver@7 "$input" || true)"
          if [ -z "$valid" ]; then
            echo "❌ '$input' is not a valid SemVer version." >&2
            exit 1
          fi

          # Compute expected MAJOR / MINOR / PATCH increments from the current version
          expectedMajor="$(npx --yes semver@7 -i major "$current")"
          expectedMinor="$(npx --yes semver@7 -i minor "$current")"
          expectedPatch="$(npx --yes semver@7 -i patch "$current")"

          # Also allow prerelease increments (e.g. 1.3.0-alpha.1) to align with release-drafter prerelease config
          expectedPremajor="$(npx --yes semver@7 -i premajor --preid alpha "$current")"
          expectedPreminor="$(npx --yes semver@7 -i preminor --preid alpha "$current")"
          expectedPrepatch="$(npx --yes semver@7 -i prepatch --preid alpha "$current")"
          expectedPrerelease="$(npx --yes semver@7 -i prerelease --preid alpha "$current" || true)"

          if [ "$input" != "$expectedMajor" ] && [ "$input" != "$expectedMinor" ] && [ "$input" != "$expectedPatch" ] && \
             [ "$input" != "$expectedPremajor" ] && [ "$input" != "$expectedPreminor" ] && [ "$input" != "$expectedPrepatch" ] && \
             [ "$input" != "$expectedPrerelease" ]; then
            echo "❌ Invalid version bump: '$input' is not a valid SemVer increment from '$current'." >&2
            echo "   Expected one of:" >&2
            echo "     MAJOR:      $expectedMajor (breaking changes)" >&2
            echo "     MINOR:      $expectedMinor (new features)" >&2
            echo "     PATCH:      $expectedPatch (bug fixes)" >&2
            echo "     PREMAJOR:   $expectedPremajor (breaking prerelease)" >&2
            echo "     PREMINOR:   $expectedPreminor (feature prerelease)" >&2
            echo "     PREPATCH:   $expectedPrepatch (fix prerelease)" >&2
            echo "     PRERELEASE: $expectedPrerelease (next prerelease iteration)" >&2
            exit 1
          fi

          echo "✅ Version bump from $current to $input is valid."

      - name: Update package.json version
        run: |
          jq --arg version "${{ github.event.inputs.version }}" \
          '.version = $version' package.json > package.json.tmp && \
          mv package.json.tmp package.json

      - name: Build web components
        run: npm run build:ci

      - name: Set npm Registry Auth Token
        run: npm set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Pack the package
        working-directory: dist
        run: npm pack
        id: npm_pack

      - name: Upload tarball as artifact
        uses: actions/upload-artifact@v5
        with:
          name: npm-tarball
          path: 'dist/*.tgz'

      - run: rm dist/*.tgz

      - name: Publish npm Package Publicly
        working-directory: dist
        run: npm publish

      - name: Set GitHub Registry Auth Token
        working-directory: dist
        run: npm set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm Package to GitHub Registry
        working-directory: dist
        run: npm publish --registry=https://npm.pkg.github.com --access public --ignore-scripts

  trigger-angular-publish:
    needs: build-and-publish-wc
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Angular Publish Workflow
        uses: benc-uk/workflow-dispatch@v1.2
        with:
          workflow: publish-angular.yml
          inputs: '{"version": "${{ github.event.inputs.version }}"}'

  trigger-react-publish:
    needs: build-and-publish-wc
    runs-on: ubuntu-latest
    steps:
      - name: Trigger React Publish Workflow
        uses: benc-uk/workflow-dispatch@v1.2
        with:
          workflow: publish-react.yml
          inputs: '{"version": "${{ github.event.inputs.version }}"}'

  trigger-vue-publish:
    needs: build-and-publish-wc
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vue Publish Workflow
        uses: benc-uk/workflow-dispatch@v1.2
        with:
          workflow: publish-vue.yml
          inputs: '{"version": "${{ github.event.inputs.version }}"}'

  release-wc:
    needs: build-and-publish-wc
    runs-on: ubuntu-latest
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v6
        with:
          name: npm-tarball
          path: .

      - name: Find the asset
        id: find-asset
        run: echo "asset_path=$(find . -name 'trimble-oss-moduswebcomponents-*.tgz')" >> $GITHUB_OUTPUT

      - name: Rename the asset to package.tgz
        run: mv ${{ steps.find-asset.outputs.asset_path }} package.tgz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: moduswebcomponents-${{ github.event.inputs.version }}
          name: Modus Web Components ${{ github.event.inputs.version }}
          files: |
            package.tgz
