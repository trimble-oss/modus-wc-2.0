name: Publish Storybook

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, prod]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write
  packages: read
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          TRIMBLE_AGENTIC_NPM_TOKEN: ${{ secrets.TRIMBLE_AGENTIC_NPM_TOKEN }}
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Storybook
        run: npm run build

      # We need to copy the CSS so it can be served by Storybook.
      - name: Copy CSS file
        run: |
          cp src/styles/output.css storybook-static/public/output.css

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        id: preview-deploy
        with:
          source-dir: ./storybook-static/
          preview-branch: gh-pages
          umbrella-dir: pr-preview

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: JamesIves/github-pages-deploy-action@v4
        id: deploy
        with:
          folder: storybook-static
          branch: gh-pages
          target-folder: ${{ github.event.inputs.branch || 'main' || 'prod'}}

      - name: Get preview URL
        if: github.event_name == 'pull_request' && steps.preview-deploy.outcome == 'success'
        id: preview-url
        run: |
          echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/pr-preview/pr-${{ github.event.number }}/" >> $GITHUB_OUTPUT

      - name: Get deployment URL
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && steps.deploy.outcome == 'success'
        id: deployment-url
        run: |
          echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/${{ github.event.inputs.branch || 'main' || 'prod' }}/" >> $GITHUB_OUTPUT

      - name: Print deployment URL
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && steps.deploy.outcome == 'success'
        run: |
          echo "Storybook deployed successfully to: ${{ steps.deployment-url.outputs.url }}"

      - name: Print failure message
        if: failure()
        run: |
          echo "Deployment failed. Please check the logs for more information."
