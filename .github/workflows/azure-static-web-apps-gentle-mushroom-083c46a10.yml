name: Azure Static Web Apps CI/CD

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy_job:
    permissions:
      contents: read # for actions/checkout to fetch code
    if: github.repository == 'trimble-oss/modus-wc-2.0'
    runs-on: ubuntu-22.04
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          lfs: false
          persist-credentials: false
          submodules: true

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GENTLE_MUSHROOM_083C46A10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: 'upload'
          skip_app_build: 'true'
          app_location: 'storybook-static' # App source code path (Storybook build output)
          api_location: '' # Api source code path - optional
          output_location: '' # Built app content directory - optional
