name: Publish & Release - MCP

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  build-and-publish-mcp:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mcp

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            mcp/package-lock.json

      - name: Bundle docs from src/stories into mcp/docs
        working-directory: .
        run: |
          mkdir -p mcp/docs
          cp src/stories/*.mdx mcp/docs/
          cp src/stories/frameworks/*.mdx mcp/docs/

      - name: Install MCP dependencies
        run: npm ci

      - name: Update package.json version
        run: |
          jq --arg version "${{ github.event.inputs.version }}" \
          '.version = $version' package.json > package.json.tmp && \
          mv package.json.tmp package.json

      - name: Build MCP server
        run: npm run build

      - name: Pack distribution
        run: npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: mcp-distribution-v${{ github.event.inputs.version }}
          path: 'mcp/*.tgz'

      - name: Clean up tgz files
        run: rm -f *.tgz

      - name: Set npm Registry Auth Token
        run: npm set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish

      - name: Set GitHub Registry Auth Token
        run: npm set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --access public --ignore-scripts

  release-mcp:
    needs: build-and-publish-mcp
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: mcp-distribution-v${{ github.event.inputs.version }}
          path: .

      - name: Find the release asset
        id: find-asset
        run: echo "asset_path=$(find . -name '*.tgz')" >> $GITHUB_OUTPUT

      - name: Rename release asset
        run: mv ${{ steps.find-asset.outputs.asset_path }} package-mcp.tgz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: moduswebcomponents-mcp-${{ github.event.inputs.version }}
          name: Modus Web Components MCP ${{ github.event.inputs.version }}
          files: |
            **/package-mcp.tgz
