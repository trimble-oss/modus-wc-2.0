name: Publish & Release - MCP

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: string

permissions:
  contents: write
  actions: write
  packages: write
  pull-requests: write

jobs:
  build-and-publish-mcp:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mcp

    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN_MCP }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # persist-credentials required so we can git push the generated version data
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            mcp/package-lock.json

      - name: Install MCP dependencies
        run: npm ci
        env:
          TRIMBLE_AGENTIC_NPM_TOKEN: ${{ secrets.TRIMBLE_AGENTIC_NPM_TOKEN }}
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version data already exists
        id: check-version
        working-directory: .
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BASE_VERSION="1.0.6"

          # Guard: base version must always live in mcp/versions/base only.
          if [ "$VERSION" = "$BASE_VERSION" ]; then
            echo "generate=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION is the configured base version; skipping generation."
            if [ -d "mcp/versions/$BASE_VERSION" ]; then
              echo "❌ Forbidden folder exists: mcp/versions/$BASE_VERSION (base must be mcp/versions/base)." >&2
              exit 1
            fi
          elif [ -d "mcp/versions/$VERSION" ]; then
            echo "generate=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION already has doc data – skipping generation."
          else
            echo "generate=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION needs doc data generation."
          fi

      - name: Generate version documentation (delta from base)
        if: steps.check-version.outputs.generate == 'true'
        working-directory: .
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TMPDIR=$(mktemp -d)

          # Extract full docs to temp dir
          npx tsx mcp/scripts/extract-docs.ts \
            --source-dir src/components \
            --output-dir "$TMPDIR/component-docs"
          mkdir -p "$TMPDIR/docs"
          cp src/stories/*.mdx "$TMPDIR/docs/"
          cp src/stories/frameworks/*.mdx "$TMPDIR/docs/"
          node -e "const fs=require('fs');const p='$TMPDIR/docs';const docs=fs.readdirSync(p).filter(f=>f.endsWith('.mdx')).map(f=>f.replace('.mdx','')).sort();fs.writeFileSync(p+'/_all_docs.json',JSON.stringify({total:docs.length,docs},null,2));"

          # Create version folder with only files that differ from base
          mkdir -p "mcp/versions/${VERSION}/component-docs"
          mkdir -p "mcp/versions/${VERSION}/docs"

          # Always copy _all_components.json (per-version gatekeeper)
          cp "$TMPDIR/component-docs/_all_components.json" \
             "mcp/versions/${VERSION}/component-docs/"
          # Always copy _all_docs.json (per-version gatekeeper)
          cp "$TMPDIR/docs/_all_docs.json" \
             "mcp/versions/${VERSION}/docs/"

          # Copy only changed component files
          for f in "$TMPDIR/component-docs/"*.json; do
            fname=$(basename "$f")
            [ "$fname" = "_all_components.json" ] && continue
            basefile="mcp/versions/base/component-docs/$fname"
            if [ ! -f "$basefile" ] || ! diff -q "$f" "$basefile" >/dev/null 2>&1; then
              cp "$f" "mcp/versions/${VERSION}/component-docs/"
            fi
          done

          # Copy only changed doc files
          for f in "$TMPDIR/docs/"*.mdx; do
            fname=$(basename "$f")
            basefile="mcp/versions/base/docs/$fname"
            if [ ! -f "$basefile" ] || ! diff -q "$f" "$basefile" >/dev/null 2>&1; then
              cp "$f" "mcp/versions/${VERSION}/docs/"
            fi
          done

          rm -rf "$TMPDIR"

      - name: Guard against accidental base version folder
        working-directory: .
        run: |
          if [ -d "mcp/versions/1.0.6" ]; then
            echo "❌ Forbidden folder exists: mcp/versions/1.0.6 (must use mcp/versions/base)." >&2
            exit 1
          fi

      - name: Update package.json version
        run: |
          jq --arg version "${{ github.event.inputs.version }}" \
          '.version = $version' package.json > package.json.tmp && \
          mv package.json.tmp package.json

      - name: Build MCP server
        run: npm run build

      - name: Pack distribution
        run: npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcp-distribution-v${{ github.event.inputs.version }}
          path: 'mcp/*.tgz'

      - name: Clean up tgz files
        run: rm -f *.tgz

      - name: Set npm Registry Auth Token
        run: npm set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN_MCP }}

      - name: Publish to npm
        run: npm publish --registry=https://registry.npmjs.org

      - name: Set GitHub Registry Auth Token
        run: npm set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --access public --ignore-scripts

      - name: Open PR with version data
        if: steps.check-version.outputs.generate == 'true'
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BRANCH="chore/mcp-docs-v${VERSION}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp/versions/
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          # Use -B so re-runs overwrite an existing local branch
          git checkout -B "$BRANCH"
          git commit -m "chore: add MCP docs for v${VERSION}"
          git push -u origin "$BRANCH" --force

          # Create PR only if one doesn't already exist for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for ${BRANCH} – skipping creation."
          else
            gh pr create \
              --title "chore: add MCP docs for v${VERSION}" \
              --body "Auto-generated versioned documentation for MCP server v${VERSION}." \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH"
          fi

  release-mcp:
    needs: build-and-publish-mcp
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: mcp-distribution-v${{ github.event.inputs.version }}
          path: .

      - name: Find the release asset
        id: find-asset
        run: echo "asset_path=$(find . -name '*.tgz')" >> $GITHUB_OUTPUT

      - name: Rename release asset
        run: mv ${{ steps.find-asset.outputs.asset_path }} package-mcp.tgz

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: moduswebcomponents-mcp-${{ github.event.inputs.version }}
          name: Modus Web Components MCP ${{ github.event.inputs.version }}
          files: |
            **/package-mcp.tgz
